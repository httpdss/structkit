name: generate-terminal-gifs

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write


    #     tapes:
    #       - 'docs/vhs/install.tape'
    #       - 'docs/vhs/basic-usage.tape'
    #       - 'docs/vhs/yaml-config.tape'
    #       - 'docs/vhs/mappings-demo.tape'
    #       - 'docs/vhs/multiple-mappings.tape'
    #       - 'docs/vhs/advanced-features.tape'
    #       - 'docs/vhs/remote-content.tape'
    #       - 'docs/vhs/schema-generation.tape'

jobs:
  run-tapes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - uses: charmbracelet/vhs-action@v2
        with:
          path: 'docs/vhs/install.tape'

      - uses: charmbracelet/vhs-action@v2
        with:
          path: 'docs/vhs/basic-usage.tape'

      - uses: charmbracelet/vhs-action@v2
        with:
          path: 'docs/vhs/yaml-config.tape'

      - uses: charmbracelet/vhs-action@v2
        with:
          path: 'docs/vhs/mappings-demo.tape'

      - uses: charmbracelet/vhs-action@v2
        with:
          path: 'docs/vhs/multiple-mappings.tape'

      - uses: charmbracelet/vhs-action@v2
        with:
          path: 'docs/vhs/advanced-features.tape'

      - uses: charmbracelet/vhs-action@v2
        with:
          path: 'docs/vhs/remote-content.tape'

      - uses: charmbracelet/vhs-action@v2
        with:
          path: 'docs/vhs/schema-generation.tape'

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: Update generated VHS GIF
          branch: repository-dispatch/update-${{ github.run_id }}
          title: Update generated VHS GIF
          body: This PR updates the generated VHS GIF files.
          base: main
          labels: automation
