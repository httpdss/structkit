files:
  - README.md:
      content: |
        # {{@ service_name @}}

        {{@ description @}}

        ## Run locally

        ```bash
        python -m pip install -e .
        uvicorn {{@ module_name @}}.main:app --reload
        ```

        ## Test

        ```bash
        python -m pytest
        ```
  - pyproject.toml:
      content: |
        [build-system]
        requires = ["setuptools>=68", "wheel"]
        build-backend = "setuptools.build_meta"

        [project]
        name = "{{@ service_name | lower | replace(' ', '-') @}}"
        version = "0.1.0"
        description = "{{@ description @}}"
        requires-python = ">=3.10"
        dependencies = [
          "fastapi>=0.110",
          "uvicorn[standard]>=0.27",
        ]

        [project.optional-dependencies]
        test = ["pytest>=8", "httpx>=0.27"]
  - app/__init__.py:
      content: |
        """{{@ service_name @}} application package."""
  - app/main.py:
      content: |
        from fastapi import FastAPI

        app = FastAPI(title="{{@ service_name @}}")


        @app.get("/health")
        def health() -> dict[str, str]:
            return {"status": "ok", "service": "{{@ service_name @}}"}
  - tests/test_health.py:
      content: |
        from fastapi.testclient import TestClient

        from app.main import app


        def test_health_endpoint():
            response = TestClient(app).get("/health")
            assert response.status_code == 200
            assert response.json()["status"] == "ok"
  - Dockerfile:
      content: |
        FROM python:3.12-slim
        WORKDIR /app
        COPY pyproject.toml ./
        COPY app ./app
        RUN pip install --no-cache-dir -e .
        EXPOSE 8000
        CMD ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
  - .env.example:
      content: |
        ENVIRONMENT=local
        LOG_LEVEL=info
  - .gitignore:
      content: |
        .env
        .venv/
        __pycache__/
        .pytest_cache/
        *.egg-info/
variables:
  - service_name:
      description: "Human-readable service name."
      type: string
      default: "Demo API"
  - module_name:
      description: "Python module name for import paths."
      type: string
      default: "app"
  - description:
      description: "Short service description."
      type: string
      default: "A small FastAPI service generated by StructKit."
