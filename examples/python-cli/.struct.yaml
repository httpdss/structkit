files:
  - README.md:
      content: |
        # {{@ project_name @}}

        {{@ description @}}

        ## Install

        ```bash
        python -m pip install -e .
        ```

        ## Use

        ```bash
        {{@ cli_command @}} --name StructKit
        ```

        ## Test

        ```bash
        python -m pytest
        ```
  - pyproject.toml:
      content: |
        [build-system]
        requires = ["setuptools>=68", "wheel"]
        build-backend = "setuptools.build_meta"

        [project]
        name = "{{@ package_name | replace('_', '-') @}}"
        version = "0.1.0"
        description = "{{@ description @}}"
        requires-python = ">=3.10"
        dependencies = ["click>=8.1"]

        [project.scripts]
        {{@ cli_command @}} = "{{@ package_name @}}.cli:main"
  - src/{{@ package_name @}}/__init__.py:
      content: |
        """{{@ project_name @}} package."""

        __version__ = "0.1.0"
  - src/{{@ package_name @}}/cli.py:
      content: |
        import click


        @click.command()
        @click.option("--name", default="world", help="Name to greet.")
        def main(name: str) -> None:
            """Run the {{@ project_name @}} CLI."""
            click.echo(f"Hello, {name}!")
  - tests/test_cli.py:
      content: |
        from click.testing import CliRunner

        from {{@ package_name @}}.cli import main


        def test_cli_greets_name():
            result = CliRunner().invoke(main, ["--name", "StructKit"])
            assert result.exit_code == 0
            assert "Hello, StructKit!" in result.output
  - .gitignore:
      content: |
        .venv/
        __pycache__/
        *.egg-info/
        .pytest_cache/
        dist/
variables:
  - project_name:
      description: "Human-readable project name."
      type: string
      default: "Demo CLI"
  - package_name:
      description: "Importable Python package name."
      type: string
      default: "demo_cli"
  - cli_command:
      description: "Console command installed by the package."
      type: string
      default: "demo-cli"
  - description:
      description: "Short package description."
      type: string
      default: "A small Python CLI generated by StructKit."
