files:
  - README.md:
      content: |
        # {{@ module_name @}}

        {{@ description @}}

        ## Usage

        ```hcl
        module "{{@ module_name | replace('-', '_') @}}" {
          source = "./path/to/{{@ module_name @}}"

          name = "example"
        }
        ```

        ## Inputs

        | Name | Description | Type | Default |
        |---|---|---|---|
        | `name` | Name prefix for resources. | `string` | n/a |

        ## Outputs

        | Name | Description |
        |---|---|
        | `name` | The resolved name value. |
  - main.tf:
      content: |
        resource "null_resource" "this" {
          triggers = {
            name = var.name
          }
        }
  - variables.tf:
      content: |
        variable "name" {
          description = "Name prefix for resources."
          type        = string
        }
  - outputs.tf:
      content: |
        output "name" {
          description = "The resolved name value."
          value       = var.name
        }
  - versions.tf:
      content: |
        terraform {
          required_version = ">= {{@ terraform_version @}}"

          required_providers {
            null = {
              source  = "{{@ provider_source @}}"
              version = "{{@ provider_version @}}"
            }
          }
        }
  - examples/basic/main.tf:
      content: |
        module "example" {
          source = "../../"

          name = "example"
        }
variables:
  - module_name:
      description: "Terraform module name."
      type: string
      default: "terraform-example-module"
  - description:
      description: "Short module description."
      type: string
      default: "A reusable Terraform module generated by StructKit."
  - terraform_version:
      description: "Minimum Terraform version."
      type: string
      default: "1.6.0"
  - provider_source:
      description: "Provider source address."
      type: string
      default: "hashicorp/null"
  - provider_version:
      description: "Provider version constraint."
      type: string
      default: ">= 3.2.0"
