description: >
  Creates ESLint configuration files (.eslintrc.json and .eslintignore) for a
  React/ES2021 project with eslint:recommended and react/recommended rules enabled.

files:
  - .eslintrc.json:
      content: |
        {
          "env": {
            "browser": true,
            "es2021": true
          },
          "extends": [
            "eslint:recommended",
            "plugin:react/recommended"
          ],
          "parserOptions": {
            "ecmaFeatures": {
              "jsx": true
            },
            "ecmaVersion": 12,
            "sourceType": "module"
          },
          "plugins": [
            "react"
          ],
          "rules": {
            "react/prop-types": "off"
          }
        }
  - .eslintignore:
      content: |
        node_modules/
        dist/
