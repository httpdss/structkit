description: >
  Creates JSHint configuration files (.jshintrc and .jshintignore) for Node.js/ES6
  JavaScript linting, excluding node_modules and dist directories.

files:
  - .jshintrc:
      content: |
        {
          "node": true,
          "esversion": 6
        }
  - .jshintignore:
      content: |
        node_modules/
        dist/
