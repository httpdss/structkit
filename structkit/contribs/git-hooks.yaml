description: >
  Creates executable Git hook shell scripts under .git/hooks/: pre-commit,
  pre-push, and commit-msg, each with a placeholder for custom hook logic.

files:
  - .git/hooks/pre-commit:
      permissions: 755
      content: |
        #!/bin/sh
        echo "Running pre-commit hook"
        # Add pre-commit tasks here
  - .git/hooks/pre-push:
      permissions: 755
      content: |
        #!/bin/sh
        echo "Running pre-push hook"
        # Add pre-push tasks here
  - .git/hooks/commit-msg:
      permissions: 755
      content: |
        #!/bin/sh
        echo "Running commit-msg hook"
        # Add commit-msg tasks here
