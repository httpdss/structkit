description: >
  Creates the scaffolding for a custom StructKit structures repository: README.md,
  custom-mappings.yaml, a structures/ directory, and common configs via sub-structures
  (devcontainer, editor-config, prettier, run-struct, release-drafter, pre-commit).

files:
  - README.md:
      content: |
        # Custom StructKit Structures
  - custom-mappings.yaml:
      content: |
        # Custom StructKit Mappings
        # This file defines custom mappings for the Struct.
        mappings:
          aws_account_ids:
            nonprod: "123456789012"
            prod: "987654321098"

  - structures/.gitkeep:
      content: ""
folders:
  - ./:
      struct:
        - configs/devcontainer
        - configs/editor-config
        - configs/prettier
        - github/workflows/run-struct
        - github/workflows/release-drafter
        - github/workflows/pre-commit
